            align-items: center;
            justify-content: center;
            margin: 0;
            overflow-x: hidden;
            transition: background 1s ease;

        .glass {
            background: rgba(255, 255, 255, 0.25);

            -webkit-backdrop-filter: blur(10px);

        }
        .timer-circle {
            transition: all 0.5s ease;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        .pulse {
            animation: pulse-animation 4s infinite ease-in-out;
        }
        @keyframes pulse-animation {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .sound-card.active {
            border: 2px solid #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }
        #affirmation {
            transition: opacity 0.5s ease-in-out;
            min-height: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 1rem;
        }
    </style>

        // --- Audio Engine Logic (디자인 결과 유지) ---
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(volumeControl.value, audioCtx.currentTime);
            masterGain.connect(audioCtx.destination);
        }

        function createRainBuffer() {
            const sampleRate = audioCtx.sampleRate;
            const length = 4 * sampleRate;
            const buffer = audioCtx.createBuffer(2, length, sampleRate);
            for (let channel = 0; channel < 2; channel++) {
                const data = buffer.getChannelData(channel);
                for (let i = 0; i < length; i++) {
                    let white = Math.random() * 2 - 1;
                    let drop = 0;
                    if (Math.random() < 0.002) drop = (Math.random() * 2 - 1) * 0.5;
                    data[i] = (white * 0.05) + drop;
                }
            }
            return buffer;
        }

        function createDeepNoise(type) {
            const bufferSize = 5 * audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(2, bufferSize, audioCtx.sampleRate);
            for (let channel = 0; channel < 2; channel++) {
                const output = buffer.getChannelData(channel);
                let lastOut = 0;
                for (let i = 0; i < bufferSize; i++) {
                    const white = Math.random() * 2 - 1;
                    output[i] = (lastOut + (0.02 * white)) / 1.02;
                    lastOut = output[i];
                    output[i] *= 3.5;
                }
            }
            return buffer;
        }

        function startBinauralBeats(baseFreq, beatFreq) {
            const leftOsc = audioCtx.createOscillator();
            const rightOsc = audioCtx.createOscillator();
            const leftGain = audioCtx.createGain();
            const rightGain = audioCtx.createGain();
            const pannerL = audioCtx.createPanner();
            const pannerR = audioCtx.createPanner();

            leftOsc.frequency.value = baseFreq;
            rightOsc.frequency.value = baseFreq + beatFreq;
            pannerL.setPosition(-1, 0, 0);
            pannerR.setPosition(1, 0, 0);
            leftGain.gain.value = 0.07;
            rightGain.gain.value = 0.07;

            leftOsc.connect(pannerL).connect(leftGain).connect(masterGain);
            rightOsc.connect(pannerR).connect(rightGain).connect(masterGain);
            leftOsc.start();
            rightOsc.start();
            binauralNodes.push(leftOsc, rightOsc, leftGain, rightGain);
        }

        function playAdvancedBird() {
            if (!isRunning || currentSoundType !== 'forest') return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            const f = audioCtx.createBiquadFilter();
            const base = 2800 + Math.random() * 1200;
            osc.frequency.setValueAtTime(base, now);
            osc.frequency.exponentialRampToValueAtTime(base + 600, now + 0.1);
            f.type = "bandpass"; f.frequency.value = base;
            g.gain.setValueAtTime(0, now);
            g.gain.linearRampToValueAtTime(volumeControl.value * 0.12, now + 0.04);
            g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
            osc.connect(f).connect(g).connect(masterGain);
            osc.start(now); osc.stop(now + 0.25);
            birdTimer = setTimeout(playAdvancedBird, 7000 + Math.random() * 12000);
        }

        function startSoundEngine() {
            initAudio();
            stopSoundEngine();
            noiseSource = audioCtx.createBufferSource();
            const filter = audioCtx.createBiquadFilter();
            
            if (currentSoundType === 'rain') {
                noiseSource.buffer = createRainBuffer();
                filter.type = "highpass";
                filter.frequency.value = 800;
                const secondFilter = audioCtx.createBiquadFilter();
                secondFilter.type = "lowpass";
                secondFilter.frequency.value = 6000;
                noiseSource.connect(filter).connect(secondFilter).connect(masterGain);
                modNodes.push(secondFilter);
            } else {
                noiseSource.buffer = createDeepNoise(currentSoundType);
                filter.type = "lowpass";
                filter.frequency.value = currentSoundType === 'forest' ? 400 : 600;
                const lfo = audioCtx.createOscillator();
                const lfoGain = audioCtx.createGain();
                lfo.frequency.value = currentSoundType === 'ocean' ? 0.12 : 0.08;
                lfoGain.gain.value = currentSoundType === 'ocean' ? 200 : 80;
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                lfo.start();
                noiseSource.connect(filter).connect(masterGain);
                modNodes.push(lfo, lfoGain);
            }

            noiseSource.loop = true;
            noiseSource.start();
            modNodes.push(noiseSource, filter);

            if (currentSoundType === 'forest') {
                startBinauralBeats(165, 6.0);
                playAdvancedBird();
            } else if (currentSoundType === 'ocean') {
                startBinauralBeats(135, 4.5);
            } else if (currentSoundType === 'rain') {
                startBinauralBeats(180, 8.0);
            }
        }

        function stopSoundEngine() {
            modNodes.forEach(n => { try { n.stop(); } catch(e) {} });
            binauralNodes.forEach(n => { try { n.stop(); } catch(e) {} });
            modNodes = [];
            binauralNodes = [];
            if (birdTimer) clearTimeout(birdTimer);
        }

        // --- UI Control ---
        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timeLeftDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        async function toggleTimer() {
            if (isRunning) {
                clearInterval(timerId);
                stopSoundEngine();
                startBtn.textContent = '다시 시작';
                circleContainer.classList.remove('pulse', 'bg-indigo-100/50');
            } else {
                startSoundEngine();
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        isRunning = false;
                        stopSoundEngine();
                        startBtn.textContent = '완료';
                        circleContainer.classList.remove('pulse');
                    }
                }, 1000);
                startBtn.textContent = '일시 정지';
                circleContainer.classList.add('pulse', 'bg-indigo-100/50');
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timerId);
            stopSoundEngine();
            timeLeft = 300;
            isRunning = false;
            updateDisplay();
            startBtn.textContent = '시작하기';
            circleContainer.classList.remove('pulse', 'bg-indigo-100/50');
        }

        soundCards.forEach(card => {
            card.addEventListener('click', () => {
                currentSoundType = card.dataset.sound;
                const bgType = card.dataset.bg;
                soundCards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                body.style.background = bgType;
                if (isRunning) startSoundEngine();
            });
        });

        startBtn.addEventListener('click', toggleTimer);
        resetBtn.addEventListener('click', resetTimer);
        newAffirmationBtn.addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * affirmations.length);
            affirmationText.style.opacity = 0;
            setTimeout(() => {
                affirmationText.textContent = `"${affirmations[randomIndex]}"`;
                affirmationText.style.opacity = 1;
            }, 500);
        });

        volumeControl.addEventListener('input', (e) => {
            if (masterGain) {
                masterGain.gain.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.1);
            }
        });

        updateDisplay();
    </script>
</body>
</html>
