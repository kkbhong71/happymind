<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HappyMind</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Sans+KR:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
body{
  font-family:'Noto Sans KR',sans-serif;
  /* Warm dawn gradient — light, calming */
  background:linear-gradient(170deg,#e8ddd0 0%,#d4c8b8 15%,#c2bfca 35%,#a8b5c4 55%,#9ab0b8 75%,#b0c0b8 100%);
  color:#3a3530;
}
.serif{font-family:'Cormorant','Noto Sans KR',serif}

/* ═══ INTRO ═══ */
#intro{position:fixed;inset:0;z-index:2000;background:linear-gradient(170deg,#e8ddd0,#c2bfca,#a8b5c4);display:flex;align-items:center;justify-content:center;transition:opacity 1.2s ease,visibility 1.2s ease}
#intro.hide{opacity:0;visibility:hidden;pointer-events:none}
.iw{text-align:center;display:flex;flex-direction:column;align-items:center;gap:0.5rem}
.i-lotus{opacity:0;animation:iF 1s 0.3s ease forwards}
.i-lotus svg{width:60px;height:60px}
.i-eye{font-size:0.45rem;letter-spacing:0.5em;color:rgba(80,70,60,0.35);opacity:0;animation:iF 1s 0.7s ease forwards}
.i-title{font-family:'Cormorant',serif;font-size:2.6rem;font-weight:400;letter-spacing:0.08em;color:#4a4035;opacity:0;animation:iF 1s 1.1s ease forwards}
.i-line{width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(160,130,90,0.5),transparent);opacity:0;animation:iF 1s 1.4s ease forwards}
.i-quote{font-family:'Cormorant',serif;font-style:italic;font-size:0.95rem;color:rgba(80,70,60,0.5);max-width:220px;line-height:1.8;opacity:0;animation:iF 1s 1.7s ease forwards}
.i-btn{margin-top:1rem;padding:0.7rem 2rem;border:1px solid rgba(140,120,80,0.3);background:rgba(255,255,255,0.3);color:#6a5a40;font-size:0.7rem;letter-spacing:0.2em;cursor:pointer;border-radius:999px;font-family:'Noto Sans KR',sans-serif;transition:all 0.4s;opacity:0;animation:iF 1s 2.1s ease forwards;backdrop-filter:blur(10px)}
.i-btn:hover{background:rgba(255,255,255,0.5);border-color:rgba(140,120,80,0.5)}
@keyframes iF{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ═══ APP ═══ */
#app{position:relative;z-index:1;width:100%;height:100dvh;display:flex;flex-direction:column;align-items:center;max-width:440px;margin:0 auto;padding:0.8rem 1rem;opacity:0;transition:opacity 0.8s ease}
#app.show{opacity:1}

/* Header */
.hdr{text-align:center;flex-shrink:0;margin-bottom:0.3rem}
.hdr h1{font-family:'Cormorant',serif;font-size:1.4rem;font-weight:400;letter-spacing:0.1em;color:#4a4035}
.hdr .sub{font-size:0.38rem;letter-spacing:0.4em;color:rgba(80,70,60,0.3)}

/* Glass Card */
.card{
  flex:1;width:100%;min-height:0;
  background:rgba(255,255,255,0.35);
  border:1px solid rgba(255,255,255,0.5);
  border-radius:1.5rem;
  backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);
  display:flex;flex-direction:column;align-items:center;
  padding:0.7rem 0.8rem 0.6rem;
  box-shadow:0 8px 32px rgba(0,0,0,0.06);
}

/* Mode Toggle */
.mt{display:flex;gap:0;margin-bottom:0.4rem;flex-shrink:0;background:rgba(0,0,0,0.04);border-radius:999px;padding:2px}
.mt-b{padding:0.3rem 0.9rem;border:none;background:none;color:rgba(80,70,60,0.35);font-size:0.6rem;font-weight:500;letter-spacing:0.08em;cursor:pointer;border-radius:999px;transition:all 0.3s;font-family:'Noto Sans KR',sans-serif}
.mt-b.on{color:#5a4a35;background:rgba(255,255,255,0.6);box-shadow:0 1px 4px rgba(0,0,0,0.06)}

/* Timer Section */
#s-timer{display:flex;flex-direction:column;align-items:center;flex:1;justify-content:center;min-height:0;gap:0.4rem}
#s-timer.hide{display:none}
.ring-area{position:relative;display:flex;align-items:center;justify-content:center}
/* Subtle mandala */
.mandala{position:absolute;width:240px;height:240px;opacity:0.06;animation:mspin 120s linear infinite}
@keyframes mspin{to{transform:rotate(360deg)}}
@media(max-width:380px){.mandala{width:200px;height:200px}}
.rbox{position:relative;width:180px;height:180px;z-index:1}
@media(max-width:380px){.rbox{width:155px;height:155px}}
@media(max-height:680px){.rbox{width:150px;height:150px}}
.rbox svg{width:100%;height:100%;transform:rotate(-90deg)}
.rbg{fill:none;stroke:rgba(0,0,0,0.06);stroke-width:2.5}
.rfg{fill:none;stroke:url(#rG);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.rcenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.r-time{font-family:'Cormorant',serif;font-size:3rem;font-weight:400;letter-spacing:0.04em;line-height:1;color:#3a3530}
@media(max-width:380px){.r-time{font-size:2.4rem}}
@media(max-height:680px){.r-time{font-size:2.2rem}}
.r-lbl{font-size:0.5rem;color:rgba(80,70,60,0.35);letter-spacing:0.2em;margin-top:0.1rem}
.presets{display:flex;gap:0.2rem;flex-shrink:0}
.pre{padding:0.2rem 0.6rem;border-radius:999px;border:1px solid rgba(0,0,0,0.07);background:rgba(255,255,255,0.3);color:rgba(80,70,60,0.4);font-size:0.55rem;cursor:pointer;transition:all 0.3s;font-family:'Noto Sans KR',sans-serif}
.pre.on{border-color:rgba(140,120,70,0.4);color:#6a5a35;background:rgba(255,255,255,0.5)}

/* Breathe Section */
#s-breathe{display:none;flex-direction:column;align-items:center;flex:1;justify-content:center;min-height:0;gap:0.4rem}
#s-breathe.show{display:flex}
.bm-row{display:flex;gap:0.25rem;flex-shrink:0}
.bm{padding:0.2rem 0.65rem;border-radius:999px;border:1px solid rgba(0,0,0,0.06);background:rgba(255,255,255,0.3);color:rgba(80,70,60,0.35);font-size:0.53rem;cursor:pointer;transition:all 0.3s;font-family:'Noto Sans KR',sans-serif}
.bm.on{border-color:rgba(80,130,100,0.4);color:#3a6a4a;background:rgba(255,255,255,0.5)}
.br-area{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center}
@media(max-width:380px){.br-area{width:165px;height:165px}}
@media(max-height:680px){.br-area{width:150px;height:150px}}
.br-ring-svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.brr-bg{fill:none;stroke:rgba(0,0,0,0.05);stroke-width:2.5}
.brr-fg{fill:none;stroke:#6b9e78;stroke-width:3;stroke-linecap:round}
.br-ball{
  width:50px;height:50px;border-radius:50%;position:relative;z-index:1;
  background:radial-gradient(circle at 35% 35%,rgba(100,160,110,0.6),rgba(80,140,90,0.2));
  box-shadow:0 4px 20px rgba(80,140,90,0.12);
  transition:width 0.3s,height 0.3s,box-shadow 0.5s,background 0.5s;
  display:flex;align-items:center;justify-content:center;
}
.br-ball.expand{width:120px;height:120px;box-shadow:0 8px 35px rgba(80,140,90,0.15)}
@media(max-width:380px){.br-ball.expand{width:100px;height:100px}}
@media(max-height:680px){.br-ball.expand{width:95px;height:95px}}
.br-ball.hold-p{background:radial-gradient(circle at 35% 35%,rgba(190,160,100,0.6),rgba(170,140,80,0.2));box-shadow:0 8px 35px rgba(190,160,100,0.15)}
.br-ball.shrink-p{width:50px;height:50px;background:radial-gradient(circle at 35% 35%,rgba(140,110,160,0.5),rgba(120,90,140,0.2));box-shadow:0 4px 20px rgba(140,110,160,0.1)}
.br-count{font-family:'Cormorant',serif;font-size:1.6rem;font-weight:400;color:rgba(255,255,255,0.9)}
.br-info{text-align:center;flex-shrink:0}
.br-label{font-family:'Cormorant',serif;font-size:1rem;color:#4a4035;letter-spacing:0.06em}
.br-sub{font-size:0.48rem;color:rgba(80,70,60,0.35);letter-spacing:0.1em;margin-top:0.05rem}

/* ═══ SOUND SECTION (compact, inline) ═══ */
.snd-sec{flex-shrink:0;width:100%;padding:0.4rem 0 0.2rem;border-top:1px solid rgba(0,0,0,0.04);margin-top:auto}
.snd-label{font-size:0.42rem;letter-spacing:0.25em;color:rgba(80,70,60,0.25);text-align:center;margin-bottom:0.3rem}
.snd-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:0.25rem}
.sc{
  display:flex;flex-direction:column;align-items:center;gap:0.1rem;
  padding:0.3rem 0;border-radius:0.6rem;cursor:pointer;transition:all 0.3s;
  background:transparent;border:1px solid transparent;
}
.sc:active{transform:scale(0.95)}
.sc.on{background:rgba(255,255,255,0.4);border-color:rgba(140,120,70,0.2);box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.sc-ico{font-size:1.1rem;line-height:1}
.sc-nm{font-size:0.42rem;color:rgba(80,70,60,0.3);font-weight:400;transition:color 0.3s}
.sc.on .sc-nm{color:#6a5a35;font-weight:500}
/* Active indicator dot */
.sc-dot{width:4px;height:4px;border-radius:50%;background:transparent;transition:background 0.3s}
.sc.on .sc-dot{background:rgba(140,120,70,0.5)}

/* Volume overlay */
.vol-bar{height:0;overflow:hidden;transition:height 0.3s;display:flex;align-items:center;justify-content:center;gap:0.3rem;width:100%}
.vol-bar.show{height:24px;margin-top:0.2rem}
.vol-bar label{font-size:0.4rem;color:rgba(80,70,60,0.3);letter-spacing:0.1em}
input[type=range]{-webkit-appearance:none;appearance:none;height:3px;background:rgba(0,0,0,0.08);border-radius:2px;outline:none;cursor:pointer;flex:1;max-width:200px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#9a8a65;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.15)}

/* ═══ AFFIRMATION ═══ */
.aff{text-align:center;padding:0.3rem 0.3rem 0;flex-shrink:0;border-top:1px solid rgba(0,0,0,0.04);margin-top:0.2rem;width:100%}
.aff-day{font-size:0.38rem;color:rgba(80,70,60,0.2);letter-spacing:0.2em;margin-bottom:0.1rem}
#aff-txt{font-family:'Cormorant',serif;font-size:0.85rem;font-weight:400;font-style:italic;line-height:1.6;color:rgba(60,55,48,0.6);transition:opacity 0.4s}
.aff-btn{margin-top:0.15rem;padding:0.12rem 0.5rem;border-radius:999px;border:none;background:rgba(0,0,0,0.03);color:rgba(80,70,60,0.3);font-size:0.4rem;cursor:pointer;transition:all 0.3s;font-family:'Noto Sans KR',sans-serif;letter-spacing:0.08em}
.aff-btn:hover{color:rgba(80,70,60,0.5);background:rgba(0,0,0,0.06)}

/* ═══ BOTTOM 3 BUTTONS ═══ */
.bbar{display:flex;gap:0.3rem;width:100%;flex-shrink:0;padding:0.3rem 0 0;border-top:1px solid rgba(0,0,0,0.04);margin-top:0.2rem}
.bb{
  flex:1;padding:0.5rem 0;border-radius:0.7rem;border:none;
  font-size:0.65rem;font-weight:500;cursor:pointer;transition:all 0.25s;
  font-family:'Noto Sans KR',sans-serif;text-align:center;
}
.bb:active{transform:scale(0.97)}
.bb-go{background:linear-gradient(135deg,#7a9e7e,#6a8e6e);color:#fff;box-shadow:0 3px 12px rgba(100,140,100,0.2)}
.bb-rs{background:rgba(255,255,255,0.4);color:rgba(80,70,60,0.45);border:1px solid rgba(0,0,0,0.06)}
.bb-snd{background:rgba(255,255,255,0.4);color:rgba(80,70,60,0.45);border:1px solid rgba(0,0,0,0.06)}

/* Footer */
.foot{text-align:center;padding:0.25rem 0 0;flex-shrink:0}
.foot p{font-size:0.38rem;color:rgba(80,70,60,0.15);letter-spacing:0.25em}

/* Sound Detail Panel */
.sp-ov{position:fixed;inset:0;background:rgba(0,0,0,0.15);z-index:99;opacity:0;visibility:hidden;transition:opacity 0.3s,visibility 0.3s}
.sp-ov.show{opacity:1;visibility:visible}
.sp{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(240,235,225,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,0.06);border-radius:1.2rem 1.2rem 0 0;
  padding:0.8rem 1.2rem 1.2rem;
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  max-height:50vh;overflow-y:auto;
}
.sp.open{transform:translateY(0)}
.sp-handle{width:28px;height:3px;background:rgba(0,0,0,0.1);border-radius:2px;margin:0 auto 0.6rem}
.sp-title{font-size:0.45rem;color:rgba(80,70,60,0.3);letter-spacing:0.3em;text-align:center;margin-bottom:0.5rem}
.sp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.3rem}
.spc{background:rgba(255,255,255,0.5);border:1px solid rgba(0,0,0,0.05);border-radius:0.6rem;padding:0.5rem 0.2rem;text-align:center;cursor:pointer;transition:all 0.3s}
.spc.on{border-color:rgba(140,120,70,0.3);background:rgba(255,255,255,0.8);box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.spc-ico{font-size:1.1rem;display:block;margin-bottom:0.1rem}
.spc-nm{font-size:0.5rem;color:rgba(80,70,60,0.35);transition:color 0.3s}
.spc.on .spc-nm{color:#5a4a30;font-weight:500}
.spc-vol{margin-top:0.2rem;height:0;opacity:0;overflow:hidden;transition:all 0.3s}
.spc.on .spc-vol{height:18px;opacity:1}
.sp-master{display:flex;align-items:center;gap:0.4rem;margin-top:0.5rem}
.sp-master label{font-size:0.42rem;color:rgba(80,70,60,0.3);letter-spacing:0.15em}
.sp-master input{flex:1}
.sp-close{display:block;margin:0.6rem auto 0;padding:0.3rem 1.3rem;border-radius:999px;border:1px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.5);color:rgba(80,70,60,0.5);font-size:0.55rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

/* Completion */
#done{position:fixed;inset:0;background:rgba(232,221,208,0.96);display:none;align-items:center;justify-content:center;flex-direction:column;gap:0.8rem;z-index:200}
#done.show{display:flex;animation:fadI 0.8s ease}
@keyframes fadI{from{opacity:0}to{opacity:1}}
.d-ico{font-size:2.5rem;animation:gPl 3s infinite ease-in-out}
@keyframes gPl{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.06);opacity:1}}
.d-msg{font-family:'Cormorant',serif;font-size:1.3rem;font-weight:400;color:#4a4035}
.d-sub{font-size:0.65rem;color:rgba(80,70,60,0.4)}
.d-cls{padding:0.45rem 1.8rem;border-radius:999px;border:1px solid rgba(140,120,70,0.25);background:rgba(255,255,255,0.4);color:#6a5a40;font-size:0.65rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="iw">
    <div class="i-lotus"><svg viewBox="0 0 100 100" fill="none"><g opacity="0.4" stroke="#8a7a55" stroke-width="0.6"><ellipse cx="50" cy="50" rx="12" ry="28" transform="rotate(0 50 50)"/><ellipse cx="50" cy="50" rx="12" ry="28" transform="rotate(30 50 50)"/><ellipse cx="50" cy="50" rx="12" ry="28" transform="rotate(60 50 50)"/><ellipse cx="50" cy="50" rx="12" ry="28" transform="rotate(90 50 50)"/><ellipse cx="50" cy="50" rx="12" ry="28" transform="rotate(120 50 50)"/><ellipse cx="50" cy="50" rx="12" ry="28" transform="rotate(150 50 50)"/><circle cx="50" cy="50" r="5"/></g></svg></div>
    <div class="i-eye">IMMERSIVE MEDITATION</div>
    <h1 class="i-title serif">HappyMind</h1>
    <div class="i-line"></div>
    <p class="i-quote serif">"고요한 마음은<br>온 우주보다 강하다"</p>
    <button class="i-btn" id="i-enter">명상 공간으로 입장</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="hdr"><h1 class="serif">HappyMind</h1><div class="sub">IMMERSIVE MEDITATION</div></header>

  <div class="card">
    <div class="mt"><button class="mt-b on" data-m="timer">명상 타이머</button><button class="mt-b" data-m="breathe">호흡 가이드</button></div>

    <!-- TIMER -->
    <div id="s-timer">
      <div class="ring-area">
        <div class="mandala"><svg viewBox="0 0 400 400" fill="none"><g stroke="rgba(120,100,70,0.5)" stroke-width="0.3"><circle cx="200" cy="200" r="50"/><circle cx="200" cy="200" r="80"/><circle cx="200" cy="200" r="110"/><circle cx="200" cy="200" r="140"/><ellipse cx="200" cy="200" rx="18" ry="90" transform="rotate(0 200 200)"/><ellipse cx="200" cy="200" rx="18" ry="90" transform="rotate(30 200 200)"/><ellipse cx="200" cy="200" rx="18" ry="90" transform="rotate(60 200 200)"/><ellipse cx="200" cy="200" rx="18" ry="90" transform="rotate(90 200 200)"/><ellipse cx="200" cy="200" rx="18" ry="90" transform="rotate(120 200 200)"/><ellipse cx="200" cy="200" rx="18" ry="90" transform="rotate(150 200 200)"/></g></svg></div>
        <div class="rbox">
          <svg viewBox="0 0 200 200"><defs><linearGradient id="rG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#7a9e7e"/><stop offset="100%" style="stop-color:#c0a868"/></linearGradient></defs>
          <circle class="rbg" cx="100" cy="100" r="90"/><circle class="rfg" id="r-fg" cx="100" cy="100" r="90" stroke-dasharray="565.49" stroke-dashoffset="0"/></svg>
          <div class="rcenter"><div class="r-time" id="t-disp">05:00</div><div class="r-lbl" id="t-lbl">준비</div></div>
        </div>
      </div>
      <div class="presets"><button class="pre" data-m="3">3분</button><button class="pre on" data-m="5">5분</button><button class="pre" data-m="10">10분</button><button class="pre" data-m="15">15분</button><button class="pre" data-m="20">20분</button><button class="pre" data-m="30">30분</button></div>
    </div>

    <!-- BREATHE -->
    <div id="s-breathe">
      <div class="bm-row"><button class="bm on" data-bm="478">4-7-8</button><button class="bm" data-bm="box">박스</button><button class="bm" data-bm="calm">고요</button></div>
      <div class="br-area">
        <svg class="br-ring-svg" viewBox="0 0 200 200"><circle class="brr-bg" cx="100" cy="100" r="92"/><circle class="brr-fg" id="brr-fg" cx="100" cy="100" r="92" stroke-dasharray="578.05" stroke-dashoffset="578.05"/></svg>
        <div class="br-ball" id="br-ball"><span class="br-count" id="br-count"></span></div>
      </div>
      <div class="br-info"><div class="br-label serif" id="br-label">시작하기</div><div class="br-sub" id="br-sub">아래 버튼을 눌러 시작</div></div>
    </div>

    <!-- SOUND (inline grid) -->
    <div class="snd-sec">
      <div class="snd-label">ATMOSPHERE</div>
      <div class="snd-grid" id="snd-grid">
        <div class="sc on" data-s="forest"><span class="sc-ico">🌿</span><span class="sc-nm">숲</span><span class="sc-dot"></span></div>
        <div class="sc" data-s="ocean"><span class="sc-ico">🌊</span><span class="sc-nm">파도</span><span class="sc-dot"></span></div>
        <div class="sc" data-s="rain"><span class="sc-ico">🌧️</span><span class="sc-nm">비</span><span class="sc-dot"></span></div>
        <div class="sc" data-s="night"><span class="sc-ico">🌙</span><span class="sc-nm">밤</span><span class="sc-dot"></span></div>
        <div class="sc" data-s="fire"><span class="sc-ico">🔥</span><span class="sc-nm">불</span><span class="sc-dot"></span></div>
        <div class="sc" data-s="bowl"><span class="sc-ico">🔔</span><span class="sc-nm">볼</span><span class="sc-dot"></span></div>
      </div>
      <div class="vol-bar" id="vol-bar"><label>볼륨</label><input type="range" id="m-vol" min="0" max="1" step="0.01" value="0.5"></div>
    </div>

    <!-- AFFIRMATION -->
    <div class="aff">
      <div class="aff-day" id="aff-day"></div>
      <p id="aff-txt" class="serif"></p>

"어떤 감정도 영원하지 않습니다. 모든 것은 지나갑니다.","고요함 속에서 나의 진정한 목소리가 들려옵니다.","하늘의 구름처럼 생각을 관찰하되 붙잡지 않습니다.","나의 내면에는 무한한 잠재력의 우주가 펼쳐져 있습니다.","지금 여기에서, 이 호흡에서, 모든 것이 시작됩니다.","나는 매일 조금씩 더 나은 사람이 되어가고 있습니다.","내 존재는 그 자체로 우주의 완벽한 신비입니다.","나는 평화롭습니다. 나는 행복합니다. 나는 온전합니다.","바람이 나뭇잎을 쓸어가듯 걱정도 자연스럽게 흘려보냅니다.","오늘의 나는 어제보다 한 뼘 더 성장한 존재입니다.","세상의 모든 아름다움은 내 안에서도 발견됩니다.","매 순간이 새로운 시작이며 가능성의 문이 열립니다.","내가 뿌린 친절의 씨앗은 반드시 아름다운 꽃으로 돌아옵니다.","나의 미소는 세상을 밝히는 가장 강력한 에너지입니다.","나는 나를 있는 그대로 수용하며 세상의 풍요를 누립니다.","모든 상황 속에서 나는 평온을 선택할 능력이 있습니다.","나는 오늘 내가 할 수 있는 최선을 다했으며 결과에 평온합니다."];

var tpls=[function(t){return"오늘 나는 "+t+"의 에너지를 온전히 받아들이며 하루를 시작합니다."},function(t){return t+"은 내 안에 이미 존재하며, 그것을 세상에 나눕니다."},function(t){return"깊은 호흡과 함께 "+t+"이 내 전신으로 퍼져 나갑니다."},function(t){return t+"의 씨앗을 심으며 내일의 풍요를 기대합니다."},function(t){return t+"으로 가득 찬 이 순간이 나의 가장 큰 축복입니다."},function(t){return"나는 "+t+"을 선택하며 두려움을 내려놓습니다."},function(t){return t+"의 물결이 내 마음의 모든 주름을 부드럽게 펴줍니다."},function(t){return"내 안의 "+t+"이 세상을 비추는 등불이 됩니다."},function(t){return t+"과 함께하는 오늘이 내 인생에서 가장 아름다운 날입니다."},function(t){return"매 호흡마다 "+t+"이 깊어지고 내면이 단단해집니다."},function(t){return t+"의 향기가 내 하루 전체를 감싸안습니다."},function(t){return"나는 "+t+"을 통해 나 자신을 더 깊이 이해합니다."},function(t){return t+"은 가장 조용한 곳에서 가장 크게 울려 퍼집니다."},function(t){return"내 삶의 모든 순간에 "+t+"의 빛이 함께합니다."},function(t){return t+"의 강물에 몸을 맡기며 흐름을 신뢰합니다."},function(t){return"세상이 어지러울수록 내 안의 "+t+"은 더욱 깊어집니다."},function(t){return t+"은 내가 세상에 줄 수 있는 가장 값진 선물입니다."},function(t){return"오늘 밤 잠들 때 "+t+"이 나를 포근히 감싸줄 것입니다."},function(t){return t+"의 날개를 달고 더 넓은 세상으로 비상합니다."},function(t){return"내 영혼 깊은 곳에서 "+t+"의 샘물이 솟아오릅니다."},function(t){return t+"은 나의 본질이며 결코 사라지지 않는 영원한 빛입니다."},function(t){return"나는 "+t+"을 품고 살아가는 것 자체가 기적임을 압니다."}];

var ctx=null,masterG=null,live={};
function AC(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();masterG=ctx.createGain();masterG.gain.value=0.5;var comp=ctx.createDynamicsCompressor();comp.threshold.value=-20;comp.knee.value=25;comp.ratio.value=4;comp.attack.value=0.005;comp.release.value=0.2;masterG.connect(comp).connect(ctx.destination)}if(ctx.state==='suspended')ctx.resume();return ctx}
function noiseBuf(sec,type){var c=AC(),len=c.sampleRate*sec,buf=c.createBuffer(2,len,c.sampleRate);for(var ch=0;ch<2;ch++){var d=buf.getChannelData(ch),l=0;for(var i=0;i<len;i++){var w=Math.random()*2-1;if(type==='brown'){d[i]=(l+0.02*w)/1.02;l=d[i];d[i]*=3.5}else if(type==='pink'){l=(l*0.997)+(w*0.003);d[i]=l*25}else d[i]=w}}return buf}
function mkForest(gn){var c=AC(),N=[],T=[];var wb=c.createBufferSource();wb.buffer=noiseBuf(8,'brown');wb.loop=true;var wf=c.createBiquadFilter();wf.type='lowpass';wf.frequency.value=180;var wg=c.createGain();wg.gain.value=0.6;var l1=c.createOscillator();l1.frequency.value=0.03;var l1g=c.createGain();l1g.gain.value=70;l1.connect(l1g).connect(wf.frequency);l1.start();wb.connect(wf).connect(wg).connect(gn);wb.start();N.push(wb,l1);var rb=c.createBufferSource();rb.buffer=noiseBuf(6,'pink');rb.loop=true;var rf=c.createBiquadFilter();rf.type='bandpass';rf.frequency.value=700;rf.Q.value=0.6;var rg=c.createGain();rg.gain.value=0.12;rb.connect(rf).connect(rg).connect(gn);rb.start();N.push(rb);function bird(){if(!live.forest)return;var t=c.currentTime,f=2000+Math.random()*1400,dur=0.15+Math.random()*0.25,notes=1+Math.floor(Math.random()*3);for(var n=0;n<notes;n++){var off=n*0.18,o=c.createOscillator(),g=c.createGain(),p=c.createStereoPanner();p.pan.value=Math.random()*2-1;o.frequency.setValueAtTime(f*(1+n*0.1),t+off);o.frequency.exponentialRampToValueAtTime(f*(1.2+n*0.15),t+off+dur*0.4);o.frequency.exponentialRampToValueAtTime(f*(0.9+n*0.05),t+off+dur);g.gain.setValueAtTime(0,t+off);g.gain.linearRampToValueAtTime(0.04,t+off+0.015);g.gain.setValueAtTime(0.04,t+off+dur*0.6);g.gain.linearRampToValueAtTime(0,t+off+dur);o.connect(p).connect(g).connect(gn);o.start(t+off);o.stop(t+off+dur+0.01)}T.push(setTimeout(bird,2000+Math.random()*6000))}T.push(setTimeout(bird,1000+Math.random()*2000));return{nodes:N,ids:T}}
function mkOcean(gn){var c=AC(),N=[],T=[];var ob=c.createBufferSource();ob.buffer=noiseBuf(10,'brown');ob.loop=true;var of1=c.createBiquadFilter();of1.type='lowpass';of1.frequency.value=220;var og=c.createGain();og.gain.value=0.3;ob.connect(of1).connect(og).connect(gn);ob.start();N.push(ob);var fb=c.createBufferSource();fb.buffer=noiseBuf(6,'white');fb.loop=true;var fh=c.createBiquadFilter();fh.type='highpass';fh.frequency.value=2800;var fg=c.createGain();fg.gain.value=0;fb.connect(fh).connect(fg).connect(gn);fb.start();N.push(fb);function wave(){if(!live.ocean)return;var t=c.currentTime,p=7+Math.random()*5,pk=p*0.35;og.gain.cancelScheduledValues(t);og.gain.setValueAtTime(og.gain.value,t);og.gain.linearRampToValueAtTime(0.7,t+pk);og.gain.linearRampToValueAtTime(0.12,t+p);fg.gain.cancelScheduledValues(t);fg.gain.setValueAtTime(0,t);fg.gain.linearRampToValueAtTime(0.07,t+pk);fg.gain.linearRampToValueAtTime(0,t+pk+2.5);T.push(setTimeout(wave,p*1000))}wave();return{nodes:N,ids:T}}
function mkRain(gn){var c=AC(),N=[],T=[];var rb=c.createBufferSource();rb.buffer=noiseBuf(8,'pink');rb.loop=true;var rlp=c.createBiquadFilter();rlp.type='lowpass';rlp.frequency.value=2800;var rg=c.createGain();rg.gain.value=0.3;rb.connect(rlp).connect(rg).connect(gn);rb.start();N.push(rb);function drop(){if(!live.rain)return;var len=Math.floor(c.sampleRate*0.06),buf=c.createBuffer(1,len,c.sampleRate),d=buf.getChannelData(0);for(var i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.01));var s=c.createBufferSource();s.buffer=buf;var g=c.createGain();g.gain.value=0.02+Math.random()*0.04;var p=c.createStereoPanner();p.pan.value=Math.random()*2-1;var hp=c.createBiquadFilter();hp.type='highpass';hp.frequency.value=2500+Math.random()*3000;s.connect(hp).connect(p).connect(g).connect(gn);s.start();T.push(setTimeout(drop,40+Math.random()*180))}drop();function thunder(){if(!live.rain)return;var t=c.currentTime,o=c.createOscillator();o.type='sine';o.frequency.value=30+Math.random()*25;var og2=c.createGain();og2.gain.setValueAtTime(0,t);og2.gain.linearRampToValueAtTime(0.1,t+1);og2.gain.linearRampToValueAtTime(0,t+5);o.connect(og2).connect(gn);o.start(t);o.stop(t+5.1);T.push(setTimeout(thunder,20000+Math.random()*40000))}T.push(setTimeout(thunder,8000+Math.random()*12000));return{nodes:N,ids:T}}
function mkNight(gn){var c=AC(),N=[],T=[];var ab=c.createBufferSource();ab.buffer=noiseBuf(10,'brown');ab.loop=true;var af=c.createBiquadFilter();af.type='lowpass';af.frequency.value=100;var ag=c.createGain();ag.gain.value=0.2;ab.connect(af).connect(ag).connect(gn);ab.start();N.push(ab);function cA(){if(!live.night)return;var t=c.currentTime,freq=4000+Math.random()*2000,pan=Math.random()*2-1,count=3+Math.floor(Math.random()*5),gap=0.04+Math.random()*0.02,dur=0.02;for(var i=0;i<count;i++){var st=t+i*(dur+gap),o=c.createOscillator();o.type='sine';o.frequency.value=freq+(Math.random()-0.5)*200;var g=c.createGain();g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(0.025,st+0.003);g.gain.setValueAtTime(0.025,st+dur-0.003);g.gain.linearRampToValueAtTime(0,st+dur);var p=c.createStereoPanner();p.pan.value=pan;o.connect(p).connect(g).connect(gn);o.start(st);o.stop(st+dur+0.01)}T.push(setTimeout(cA,400+Math.random()*1500))}cA();function cB(){if(!live.night)return;var t=c.currentTime,freq=3200+Math.random()*800,pan=Math.random()*2-1,count=8+Math.floor(Math.random()*10);for(var i=0;i<count;i++){var st=t+i*0.06,o=c.createOscillator();o.type='sine';o.frequency.value=freq;var g=c.createGain();g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(0.015,st+0.005);g.gain.setValueAtTime(0.015,st+0.025);g.gain.linearRampToValueAtTime(0,st+0.035);var p=c.createStereoPanner();p.pan.value=pan;o.connect(p).connect(g).connect(gn);o.start(st);o.stop(st+0.04)}T.push(setTimeout(cB,1500+Math.random()*3000))}T.push(setTimeout(cB,800));function owl(){if(!live.night)return;var t=c.currentTime,f=380+Math.random()*60;[0,0.55].forEach(function(off){var o=c.createOscillator();o.type='sine';o.frequency.value=f;var g=c.createGain();g.gain.setValueAtTime(0,t+off);g.gain.linearRampToValueAtTime(0.035,t+off+0.08);g.gain.setValueAtTime(0.035,t+off+0.25);g.gain.linearRampToValueAtTime(0,t+off+0.45);o.connect(g).connect(gn);o.start(t+off);o.stop(t+off+0.5)});T.push(setTimeout(owl,18000+Math.random()*30000))}T.push(setTimeout(owl,5000+Math.random()*8000));return{nodes:N,ids:T}}
function mkFire(gn){var c=AC(),N=[],T=[];var rb=c.createBufferSource();rb.buffer=noiseBuf(8,'brown');rb.loop=true;var rlp=c.createBiquadFilter();rlp.type='lowpass';rlp.frequency.value=280;var rg2=c.createGain();rg2.gain.value=0.4;var lfo=c.createOscillator();lfo.frequency.value=0.12;var lfog=c.createGain();lfog.gain.value=60;lfo.connect(lfog).connect(rlp.frequency);lfo.start();rb.connect(rlp).connect(rg2).connect(gn);rb.start();N.push(rb,lfo);var mb=c.createBufferSource();mb.buffer=noiseBuf(5,'white');mb.loop=true;var mbp=c.createBiquadFilter();mbp.type='bandpass';mbp.frequency.value=2200;mbp.Q.value=1.2;var mg=c.createGain();mg.gain.value=0.05;mb.connect(mbp).connect(mg).connect(gn);mb.start();N.push(mb);function crackle(){if(!live.fire)return;var t=c.currentTime,count=3+Math.floor(Math.random()*6);for(var i=0;i<count;i++){var off=Math.random()*0.15,len=Math.floor(c.sampleRate*0.03),buf=c.createBuffer(1,len,c.sampleRate),d=buf.getChannelData(0);for(var j=0;j<len;j++)d[j]=(Math.random()*2-1)*Math.exp(-j/(c.sampleRate*0.004));var s=c.createBufferSource();s.buffer=buf;var g=c.createGain();g.gain.value=0.03+Math.random()*0.06;var hp=c.createBiquadFilter();hp.type='highpass';hp.frequency.value=1800+Math.random()*3000;var p=c.createStereoPanner();p.pan.value=(Math.random()-0.5)*1.2;s.connect(hp).connect(p).connect(g).connect(gn);s.start(t+off)}T.push(setTimeout(crackle,100+Math.random()*300))}crackle();function pop(){if(!live.fire)return;var len=Math.floor(c.sampleRate*0.05),buf=c.createBuffer(1,len,c.sampleRate),d=buf.getChannelData(0);for(var i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.008));var s=c.createBufferSource();s.buffer=buf;var g=c.createGain();g.gain.value=0.1+Math.random()*0.08;var bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=800+Math.random()*600;bp.Q.value=2;s.connect(bp).connect(g).connect(gn);s.start();T.push(setTimeout(pop,1500+Math.random()*4000))}T.push(setTimeout(pop,800));return{nodes:N,ids:T}}
function mkBowl(gn){var c=AC(),N=[],T=[];function strike(){if(!live.bowl)return;var t=c.currentTime;[{r:1,a:0.10,d:0.3,dc:10},{r:2.0,a:0.06,d:0.5,dc:8},{r:3.01,a:0.035,d:0.7,dc:6},{r:4.7,a:0.02,d:1.0,dc:5},{r:5.8,a:0.012,d:1.2,dc:4}].forEach(function(h){var oA=c.createOscillator();oA.type='sine';oA.frequency.value=220*h.r;var oB=c.createOscillator();oB.type='sine';oB.frequency.value=220*h.r+h.d;var g=c.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(h.a,t+0.008);g.gain.setTargetAtTime(h.a*0.5,t+0.5,h.dc*0.3);g.gain.setTargetAtTime(0.0001,t+h.dc*0.5,h.dc*0.3);oA.connect(g);oB.connect(g);g.connect(gn);oA.start(t);oA.stop(t+h.dc+1);oB.start(t);oB.stop(t+h.dc+1)});var imp=c.createBufferSource(),ibuf=c.createBuffer(1,c.sampleRate*0.05,c.sampleRate),id=ibuf.getChannelData(0);for(var i=0;i<id.length;i++)id[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.005));imp.buffer=ibuf;var ig=c.createGain();ig.gain.setValueAtTime(0.06,t);ig.gain.exponentialRampToValueAtTime(0.001,t+0.08);var ibp=c.createBiquadFilter();ibp.type='bandpass';ibp.frequency.value=3000;ibp.Q.value=1;imp.connect(ibp).connect(ig).connect(gn);imp.start(t);T.push(setTimeout(strike,12000+Math.random()*8000))}strike();return{nodes:N,ids:T}}
var engines={forest:mkForest,ocean:mkOcean,rain:mkRain,night:mkNight,fire:mkFire,bowl:mkBowl};
function toggleSnd(type){if(live[type]){live[type].nodes.forEach(function(n){try{n.stop()}catch(e){}});live[type].ids.forEach(clearTimeout);live[type].gain.disconnect();delete live[type]}else{var c=AC(),gn=c.createGain();gn.gain.value=0.7;gn.connect(masterG);var r=engines[type](gn);live[type]={gain:gn,nodes:r.nodes,ids:r.ids}}syncUI()}
function syncUI(){document.querySelectorAll('.sc').forEach(function(c){c.classList.toggle('on',!!live[c.dataset.s])});document.querySelectorAll('.spc').forEach(function(c){c.classList.toggle('on',!!live[c.dataset.s])});document.getElementById('vol-bar').classList.toggle('show',Object.keys(live).length>0)}
document.querySelectorAll('.sc').forEach(function(c){c.onclick=function(){toggleSnd(c.dataset.s)}});
document.querySelectorAll('.spc').forEach(function(cd){cd.addEventListener('click',function(e){if(e.target.classList.contains('sp-sv'))return;toggleSnd(cd.dataset.s)});var sv=cd.querySelector('.sp-sv');if(sv){sv.addEventListener('input',function(e){e.stopPropagation();if(live[cd.dataset.s])live[cd.dataset.s].gain.gain.setTargetAtTime(parseFloat(e.target.value),ctx.currentTime,0.1)});sv.addEventListener('click',function(e){e.stopPropagation()})}});
document.getElementById('m-vol').addEventListener('input',function(e){if(masterG)masterG.gain.setTargetAtTime(parseFloat(e.target.value),ctx.currentTime,0.1);document.getElementById('m-vol2').value=e.target.value});
document.getElementById('m-vol2').addEventListener('input',function(e){if(masterG)masterG.gain.setTargetAtTime(parseFloat(e.target.value),ctx.currentTime,0.1);document.getElementById('m-vol').value=e.target.value});
var needsInit=true;function ensureSnd(){if(needsInit&&Object.keys(live).length===0){toggleSnd('forest');needsInit=false}}

/* ═══ TIMER ═══ */
var total=300,left=300,tid=null,running=false,CIRC=2*Math.PI*90;
var rFg=document.getElementById('r-fg');rFg.style.strokeDasharray=CIRC;rFg.style.strokeDashoffset='0';
function updT(){var m=Math.floor(left/60),s=left%60;document.getElementById('t-disp').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;rFg.style.strokeDashoffset=CIRC*(1-left/total)}
function startTimer(){if(running){clearInterval(tid);running=false;document.getElementById('b-go').textContent='명상 시작';document.getElementById('t-lbl').textContent='일시정지';return}ensureSnd();running=true;document.getElementById('b-go').textContent='일시정지';document.getElementById('t-lbl').textContent='명상 중';tid=setInterval(function(){left--;updT();if(left<=0){clearInterval(tid);running=false;document.getElementById('b-go').textContent='명상 시작';document.getElementById('t-lbl').textContent='완료';onDone()}},1000)}
function resetTimer(){clearInterval(tid);running=false;var ap=document.querySelector('.pre.on');total=ap?parseInt(ap.dataset.m)*60:300;left=total;updT();rFg.style.strokeDashoffset='0';document.getElementById('b-go').textContent='명상 시작';document.getElementById('t-lbl').textContent='준비'}
function onDone(){var c=AC(),t=c.currentTime;[1,1.5,2,3].forEach(function(h,i){var o=c.createOscillator();o.frequency.value=440*h;var g=c.createGain();g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime([0.08,0.05,0.03,0.015][i],t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+6);o.connect(g).connect(masterG);o.start();o.stop(t+7)});document.getElementById('done-dur').textContent=Math.round(total/60)+'분간의 고요한 시간이었습니다';document.getElementById('done').classList.add('show')}
document.querySelectorAll('.pre').forEach(function(b){b.onclick=function(){document.querySelectorAll('.pre').forEach(function(x){x.classList.remove('on')});b.classList.add('on');if(!running){total=parseInt(b.dataset.m)*60;left=total;updT();rFg.style.strokeDashoffset='0'}}});
document.getElementById('b-done').onclick=function(){document.getElementById('done').classList.remove('show');resetTimer()};

/* ═══ BREATHING ═══ */
var bModes={'478':{i:4,h:7,o:8,h2:0},'box':{i:4,h:4,o:4,h2:4},'calm':{i:5,h:0,o:7,h2:0}};
var bMode='478',bRun=false,bTid=null,bCntTid=null,BR_CIRC=2*Math.PI*92,brrFg=document.getElementById('brr-fg');
brrFg.style.strokeDasharray=BR_CIRC;brrFg.style.strokeDashoffset=BR_CIRC;
document.querySelectorAll('.bm').forEach(function(b){b.onclick=function(){document.querySelectorAll('.bm').forEach(function(x){x.classList.remove('on')});b.classList.add('on');bMode=b.dataset.bm;if(bRun){stopB();startB()}}});
function startB(){bRun=true;document.getElementById('b-go').textContent='호흡 멈춤';ensureSnd();bCycle()}
function stopB(){bRun=false;clearTimeout(bTid);clearInterval(bCntTid);document.getElementById('b-go').textContent='호흡 시작';document.getElementById('br-ball').className='br-ball';document.getElementById('br-label').textContent='시작하기';document.getElementById('br-sub').textContent='아래 버튼을 눌러 시작';document.getElementById('br-count').textContent='';brrFg.style.strokeDashoffset=BR_CIRC;brrFg.style.transition='none'}
function animRing(dur,color){brrFg.style.stroke=color;brrFg.style.transition='none';brrFg.style.strokeDashoffset=BR_CIRC;brrFg.getBoundingClientRect();brrFg.style.transition='stroke-dashoffset '+dur+'s linear';brrFg.style.strokeDashoffset='0'}
function cntDown(sec){clearInterval(bCntTid);var r=sec;document.getElementById('br-count').textContent=r;bCntTid=setInterval(function(){r--;if(r<=0){clearInterval(bCntTid);document.getElementById('br-count').textContent=''}else document.getElementById('br-count').textContent=r},1000)}
function bCycle(){if(!bRun)return;var m=bModes[bMode],ball=document.getElementById('br-ball'),lbl=document.getElementById('br-label'),sub=document.getElementById('br-sub');ball.style.transition='all '+m.i+'s ease-in-out';ball.className='br-ball';setTimeout(function(){ball.classList.add('expand')},30);lbl.textContent='들숨';sub.textContent=m.i+'초 들이마시기';animRing(m.i,'#6b9e78');cntDown(m.i);bTid=setTimeout(function(){if(!bRun)return;if(m.h>0){ball.style.transition='all 0.5s ease';ball.className='br-ball expand hold-p';lbl.textContent='참기';sub.textContent=m.h+'초 멈추기';animRing(m.h,'#c0a060');cntDown(m.h);bTid=setTimeout(function(){if(bRun)exP()},m.h*1000)}else exP()},m.i*1000);function exP(){ball.style.transition='all '+m.o+'s ease-in-out';ball.className='br-ball shrink-p';lbl.textContent='날숨';sub.textContent=m.o+'초 내쉬기';animRing(m.o,'#907099');cntDown(m.o);bTid=setTimeout(function(){if(!bRun)return;if(m.h2>0){ball.style.transition='all 0.5s ease';lbl.textContent='참기';sub.textContent=m.h2+'초 멈추기';animRing(m.h2,'#c0a060');cntDown(m.h2);bTid=setTimeout(function(){if(bRun)bCycle()},m.h2*1000)}else bCycle()},m.o*1000)}}

document.getElementById('b-go').onclick=function(){var isT=document.querySelector('.mt-b.on').dataset.m==='timer';if(isT)startTimer();else{if(bRun)stopB();else startB()}};
document.getElementById('b-rs').onclick=function(){var isT=document.querySelector('.mt-b.on').dataset.m==='timer';if(isT)resetTimer();else stopB()};
updT();
</script>
