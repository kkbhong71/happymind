            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);

            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }
        .pulse {
            animation: breathe-slow 6s infinite ease-in-out;
        }
        @keyframes breathe-slow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
            50% { transform: scale(1.08); box-shadow: 0 0 50px rgba(99, 102, 241, 0.3); }
        }
        .sound-card {
            transition: all 0.4s ease;
        }
        .sound-card.active {
            border: 2px solid #6366f1;
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-4px);
        }
        input[type=range] {
            cursor: pointer;
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(document.getElementById('volume').value, audioCtx.currentTime);
            masterGain.connect(audioCtx.destination);
        }

        function createForestWind() {
            const bufferSize = audioCtx.sampleRate * 10;
            const buffer = audioCtx.createBuffer(2, bufferSize, audioCtx.sampleRate);
            for (let channel = 0; channel < 2; channel++) {
                const data = buffer.getChannelData(channel);
                let lastOut = 0;
                for (let i = 0; i < bufferSize; i++) {
                    const white = Math.random() * 2 - 1;
                    data[i] = (lastOut + (0.01 * white)) / 1.01;
                    lastOut = data[i];
                    data[i] *= 1.5;
                }
            }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = "lowpass";
            filter.frequency.value = 250;

            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.frequency.value = 0.04;
            lfoGain.gain.value = 100;
            lfo.connect(lfoGain);
            lfoGain.connect(filter.frequency);
            lfo.start();

            source.connect(filter).connect(masterGain);
            coreNodes.push(source, lfo, lfoGain, filter);
            source.start();
        }

        function createBird() {
            if (!isRunning || currentSoundType !== 'forest') return;
            
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            
            const baseFreq = 2200 + Math.random() * 800;
            osc.frequency.setValueAtTime(baseFreq, now);
            osc.frequency.exponentialRampToValueAtTime(baseFreq + 600, now + 0.1);
            osc.frequency.exponentialRampToValueAtTime(baseFreq - 200, now + 0.3);
            
            filter.type = "bandpass";
            filter.frequency.value = baseFreq + 300;
            filter.Q.value = 5;

            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.08, now + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            
            const panner = audioCtx.createStereoPanner();
            panner.pan.value = Math.random() * 2 - 1;

            osc.connect(filter).connect(panner).connect(gainNode).connect(masterGain);
            osc.start(now);
            osc.stop(now + 0.5);
            
            birdTimers.push(setTimeout(createBird, 3000 + Math.random() * 4000));
        }

        function createRealisticRain() {
            const bufferSize = audioCtx.sampleRate * 5;
            const buffer = audioCtx.createBuffer(2, bufferSize, audioCtx.sampleRate);
            for (let channel = 0; channel < 2; channel++) {
                const data = buffer.getChannelData(channel);
                for (let i = 0; i < bufferSize; i++) {
                    let p = Math.random();
                    let background = (Math.random() * 2 - 1) * 0.012;
                    let drop = 0;
                    if (p > 0.999) drop = (Math.random() * 2 - 1) * 0.25;
                    data[i] = background + drop;
                }
            }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true;
            
            const lowFilter = audioCtx.createBiquadFilter();
            lowFilter.type = "lowpass";
            lowFilter.frequency.value = 1800;

            const resonanceFilter = audioCtx.createBiquadFilter();
            resonanceFilter.type = "peaking";
            resonanceFilter.frequency.value = 800;
            resonanceFilter.Q.value = 1.5;
            resonanceFilter.gain.value = 5;

            source.connect(lowFilter).connect(resonanceFilter).connect(masterGain);
            source.start();
            coreNodes.push(source, lowFilter, resonanceFilter);
        }

        function createOceanEngine() {
            const bufferSize = audioCtx.sampleRate * 6;
            const buffer = audioCtx.createBuffer(2, bufferSize, audioCtx.sampleRate);
            for (let c = 0; c < 2; c++) {
                const d = buffer.getChannelData(c);
                let lastOut = 0;
                for (let i = 0; i < d.length; i++) {
                    const white = Math.random() * 2 - 1;
                    d[i] = (lastOut + (0.02 * white)) / 1.02;
                    lastOut = d[i];
                    d[i] *= 2.0;
                }
            }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true;

            const filter = audioCtx.createBiquadFilter();
            filter.type = "lowpass";
            filter.frequency.value = 300;

            const gainNode = audioCtx.createGain();
            const cycle = 10; 
            
            function animateWave() {
                if (!isRunning || currentSoundType !== 'ocean') return;
                const t = audioCtx.currentTime;
                gainNode.gain.cancelScheduledValues(t);
                gainNode.gain.exponentialRampToValueAtTime(0.35, t + 4.5);
                gainNode.gain.exponentialRampToValueAtTime(0.001, t + cycle);
                setTimeout(animateWave, cycle * 1000);
            }

            source.connect(filter).connect(gainNode).connect(masterGain);
            source.start();
            coreNodes.push(source, filter, gainNode);
            animateWave();
        }

        function startSoundEngine() {
            initAudio();
            stopSoundEngine();

            if (currentSoundType === 'forest') {
                createForestWind(); 
                createBird();    
                setTimeout(createBird, 1500);
            } else if (currentSoundType === 'ocean') {
                createOceanEngine(); 
            } else {
                createRealisticRain();    
            }
        }

        function stopSoundEngine() {
            coreNodes.forEach(n => { try { n.stop(); } catch(e) {} });
            birdTimers.forEach(clearTimeout);
            coreNodes = []; birdTimers = [];
        }

        // --- UI 및 제어 ---
        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('time-left').textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            if (isRunning) {
                clearInterval(timerId); stopSoundEngine();
                document.getElementById('start-btn').textContent = '다시 시작';
                document.getElementById('circle-container').classList.remove('pulse');
            } else {
                startSoundEngine();
                timerId = setInterval(() => {
                    timeLeft--; updateDisplay();
                    if (timeLeft <= 0) { clearInterval(timerId); stopSoundEngine(); isRunning = false; }
                }, 1000);
                document.getElementById('start-btn').textContent = '일시 정지';
                document.getElementById('circle-container').classList.add('pulse');
            }
            isRunning = !isRunning;
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            clearInterval(timerId); stopSoundEngine();
            timeLeft = 300; isRunning = false; updateDisplay();
            document.getElementById('start-btn').textContent = '시작하기';
            document.getElementById('circle-container').classList.remove('pulse');
        });

        document.querySelectorAll('.sound-card').forEach(card => {
            card.addEventListener('click', () => {
                currentSoundType = card.dataset.sound;
                document.querySelectorAll('.sound-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                document.getElementById('main-body').style.background = card.dataset.bg;
                if (isRunning) startSoundEngine();
            });
        });

        document.getElementById('new-affirmation').addEventListener('click', () => {
            const text = affirmations[Math.floor(Math.random() * affirmations.length)];
            const el = document.getElementById('affirmation');
            el.style.opacity = 0;
            el.style.transform = "translateY(5px)";
            setTimeout(() => { 
                el.textContent = `"${text}"`; 
                el.style.opacity = 1; 
                el.style.transform = "translateY(0)";
            }, 400);
        });

        document.getElementById('volume').addEventListener('input', (e) => {
            if (masterGain) masterGain.gain.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.1);
        });

        updateDisplay();
    </script>
</body>
</html>
