<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HappyMind — Immersive Meditation</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@200;300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0e14;--bg2:#10141e;--card:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.06);--border-hi:rgba(255,255,255,0.12);
  --t1:#ede8e0;--t2:rgba(237,232,224,0.55);--t3:rgba(237,232,224,0.2);
  --gold:#d4a853;--gold-g:rgba(212,168,83,0.2);
  --sage:#7a9e7e;--sage-g:rgba(122,158,126,0.2);
  --plum:#8b7191;--plum-g:rgba(139,113,145,0.15);
  --warm:#c17f59;
}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);overflow-x:hidden}
.serif{font-family:'Playfair Display','Noto Sans KR',serif}

/* INTRO */
#intro{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 1.2s ease,visibility 1.2s ease}
#intro.hide{opacity:0;visibility:hidden;pointer-events:none}
#intro-canvas{position:absolute;inset:0;z-index:0}
.intro-content{position:relative;z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1rem}
.intro-eyebrow{font-size:0.55rem;letter-spacing:0.5em;color:var(--t3);text-transform:uppercase;opacity:0;animation:iF 1.5s 0.5s ease forwards}
.intro-title{font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:300;letter-spacing:0.06em;color:var(--t1);opacity:0;animation:iF 1.5s 1s ease forwards}
.intro-sub{font-size:0.85rem;font-weight:200;color:var(--t2);letter-spacing:0.15em;opacity:0;animation:iF 1.5s 1.8s ease forwards}
.intro-divider{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;animation:iF 1.5s 2.2s ease forwards}
.intro-quote{font-family:'Playfair Display',serif;font-style:italic;font-size:0.9rem;color:var(--t2);max-width:280px;line-height:1.8;opacity:0;animation:iF 1.5s 2.6s ease forwards}
.intro-btn{margin-top:1.5rem;padding:0.8rem 2.5rem;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:0.75rem;letter-spacing:0.25em;text-transform:uppercase;cursor:pointer;border-radius:999px;font-family:'Noto Sans KR',sans-serif;transition:all 0.5s ease;opacity:0;animation:iF 1.5s 3.2s ease forwards}
.intro-btn:hover{background:var(--gold-g);transform:scale(1.03)}
@keyframes iF{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* BG */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:0;pointer-events:none;z-index:0;transition:opacity 2s ease}
.orb.show{opacity:1}
.orb-a{width:500px;height:500px;background:radial-gradient(circle,rgba(122,158,126,0.08),transparent);top:-150px;left:-150px;animation:oF1 25s infinite ease-in-out}
.orb-b{width:400px;height:400px;background:radial-gradient(circle,rgba(212,168,83,0.06),transparent);bottom:-100px;right:-100px;animation:oF2 30s infinite ease-in-out}
.orb-c{width:350px;height:350px;background:radial-gradient(circle,rgba(139,113,145,0.06),transparent);top:40%;left:60%;animation:oF3 35s infinite ease-in-out}
@keyframes oF1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,50px)}}
@keyframes oF2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-40px)}}
@keyframes oF3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,30px) scale(1.15)}}

/* APP */
#app{position:relative;z-index:1;max-width:460px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;padding:0 1.25rem;opacity:0;transition:opacity 1s ease 0.5s}
#app.show{opacity:1}
.app-head{padding:1.5rem 0 0.5rem;text-align:center}
.app-head h1{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:300;letter-spacing:0.08em}
.app-head .tag{font-size:0.5rem;letter-spacing:0.4em;color:var(--t3);margin-top:0.15rem}

/* Tabs */
.tabs{display:flex;margin:1rem 0 1.25rem;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:0.7rem 0;border:none;background:none;color:var(--t3);font-size:0.68rem;font-weight:500;letter-spacing:0.15em;cursor:pointer;position:relative;transition:color 0.4s;font-family:'Noto Sans KR',sans-serif}
.tab.on{color:var(--gold)}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:1px;background:var(--gold)}
.pnl{display:none;flex-direction:column;gap:1.25rem;animation:pUp 0.4s ease}
.pnl.on{display:flex}
@keyframes pUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* TIMER */
.ring-wrap{display:flex;justify-content:center;padding:0.5rem 0}
.ring-box{position:relative;width:210px;height:210px}
.ring-box svg{width:100%;height:100%;transform:rotate(-90deg)}
.r-bg{fill:none;stroke:var(--border);stroke-width:3}
.r-fg{fill:none;stroke:url(#rGrad);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.ring-mid{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-time{font-family:'Playfair Display',serif;font-size:3.4rem;font-weight:300;letter-spacing:0.06em;line-height:1}
.ring-lbl{font-size:0.55rem;color:var(--t3);letter-spacing:0.25em;margin-top:0.3rem;text-transform:uppercase}
.presets{display:flex;justify-content:center;gap:0.4rem;flex-wrap:wrap}
.pre{padding:0.35rem 0.9rem;border-radius:999px;border:1px solid var(--border);background:none;color:var(--t3);font-size:0.65rem;cursor:pointer;transition:all 0.3s;font-family:'Noto Sans KR',sans-serif}
.pre.on,.pre:hover{border-color:var(--gold);color:var(--gold)}
.ctrls{display:flex;justify-content:center;gap:0.6rem}
.cb{padding:0.6rem 2rem;border-radius:999px;border:none;font-size:0.72rem;font-weight:500;cursor:pointer;transition:all 0.3s;font-family:'Noto Sans KR',sans-serif;letter-spacing:0.06em}
.cb-go{background:linear-gradient(135deg,var(--sage),#5a8a5e);color:#fff;box-shadow:0 4px 20px var(--sage-g)}
.cb-go:hover{box-shadow:0 6px 28px var(--sage-g);transform:translateY(-1px)}
.cb-rs{background:var(--card);color:var(--t3);border:1px solid var(--border)}
.aff-card{background:var(--card);border:1px solid var(--border);border-radius:1.25rem;padding:1.5rem 1.25rem;text-align:center;position:relative;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.aff-card::before{content:'\201C';position:absolute;top:0.6rem;left:1rem;font-size:1.8rem;color:rgba(212,168,83,0.1);font-family:serif}
.aff-day{font-size:0.5rem;color:var(--t3);letter-spacing:0.2em;margin-bottom:0.4rem}
#aff-txt{font-family:'Playfair Display',serif;font-size:1rem;font-weight:300;font-style:italic;line-height:1.8;color:var(--t1);transition:opacity 0.5s;max-width:92%}
.aff-next{margin-top:0.8rem;padding:0.3rem 1rem;border-radius:999px;border:1px solid var(--border);background:none;color:var(--t3);font-size:0.55rem;cursor:pointer;transition:all 0.3s;font-family:'Noto Sans KR',sans-serif;letter-spacing:0.12em}
.aff-next:hover{border-color:var(--gold);color:var(--gold)}

/* SOUND */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem}
.sc{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:0.9rem 0.4rem;text-align:center;cursor:pointer;transition:all 0.4s;position:relative}
.sc.on{border-color:var(--gold)}
.sc-ico{font-size:1.5rem;display:block;margin-bottom:0.3rem;transition:transform 0.3s}
.sc.on .sc-ico{transform:scale(1.15)}
.sc-nm{font-size:0.62rem;color:var(--t3);display:block;transition:color 0.3s}
.sc.on .sc-nm{color:var(--gold)}
.sv-w{margin-top:0.4rem;height:0;opacity:0;overflow:hidden;transition:all 0.3s}
.sc.on .sv-w{height:20px;opacity:1}
input[type=range]{-webkit-appearance:none;appearance:none;width:75%;height:2px;background:rgba(255,255,255,0.1);border-radius:1px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--gold);border:none}
.sv-hint{font-size:0.52rem;color:var(--t3);text-align:center;letter-spacing:0.12em}
.mv{display:flex;align-items:center;gap:0.6rem;padding:0.4rem 0.8rem;background:var(--card);border-radius:999px;border:1px solid var(--border)}
.mv label{font-size:0.55rem;color:var(--t3);letter-spacing:0.15em;white-space:nowrap}
.mv input{flex:1}

/* BREATHE */
.br-modes{display:flex;gap:0.4rem;justify-content:center}
.br-m{padding:0.35rem 0.9rem;border-radius:999px;border:1px solid var(--border);background:none;color:var(--t3);font-size:0.63rem;cursor:pointer;transition:all 0.3s;font-family:'Noto Sans KR',sans-serif}
.br-m.on{border-color:var(--sage);color:var(--sage)}
.br-wrap{display:flex;flex-direction:column;align-items:center;gap:1.2rem;padding:1rem 0}
.br-outer{width:220px;height:220px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;background:radial-gradient(circle,rgba(122,158,126,0.05),transparent)}
.br-outer::before,.br-outer::after{content:'';position:absolute;border-radius:50%;border:1px solid rgba(122,158,126,0.08);animation:ripple 4s infinite ease-out}
.br-outer::before{width:180px;height:180px;animation-delay:0s}
.br-outer::after{width:220px;height:220px;animation-delay:2s}
@keyframes ripple{0%{transform:scale(0.8);opacity:0.5}100%{transform:scale(1.2);opacity:0}}
.br-ball{width:70px;height:70px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--sage),rgba(122,158,126,0.3));box-shadow:0 0 30px var(--sage-g);transition:width 0.5s,height 0.5s,box-shadow 0.5s,background 0.5s;position:relative;z-index:1}
.br-ball.in{width:150px;height:150px;box-shadow:0 0 60px var(--sage-g)}
.br-ball.hold{box-shadow:0 0 50px var(--gold-g);background:radial-gradient(circle at 35% 35%,var(--gold),rgba(212,168,83,0.3))}
.br-ball.out{width:70px;height:70px;box-shadow:0 0 20px var(--plum-g);background:radial-gradient(circle at 35% 35%,var(--plum),rgba(139,113,145,0.3))}
.br-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Playfair Display',serif;font-size:1rem;color:var(--t1);pointer-events:none;z-index:2;white-space:nowrap}
.br-phase{font-size:0.6rem;color:var(--t2);letter-spacing:0.2em}

/* Footer */
.foot{text-align:center;padding:1.5rem 0 2rem;border-top:1px solid var(--border);margin-top:auto}
.foot p{font-size:0.5rem;color:var(--t3);letter-spacing:0.25em}

/* Done */
#done{position:fixed;inset:0;background:rgba(11,14,20,0.95);display:none;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;z-index:100}
#done.show{display:flex;animation:fadeIn 0.8s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.done-ico{font-size:3rem;animation:gP 3s infinite ease-in-out}
@keyframes gP{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.08);opacity:1}}
.done-msg{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:300;text-align:center}
.done-sub{font-size:0.7rem;color:var(--t2)}
.done-cls{padding:0.5rem 2rem;border-radius:999px;border:1px solid var(--gold);background:none;color:var(--gold);font-size:0.7rem;cursor:pointer;margin-top:0.5rem;font-family:'Noto Sans KR',sans-serif;transition:all 0.3s}
@media(max-width:380px){.intro-title{font-size:2.4rem}.ring-box{width:180px;height:180px}.ring-time{font-size:2.8rem}.sg{gap:0.35rem}.sc{padding:0.7rem 0.3rem}}
</style>
</head>
<body>

<div id="intro">
  <canvas id="intro-canvas"></canvas>
  <div class="intro-content">
    <div class="intro-eyebrow">Immersive Meditation</div>
    <h1 class="intro-title serif">HappyMind</h1>
    <div class="intro-divider"></div>
    <p class="intro-sub">마음의 평화를 찾는 시간</p>
    <p class="intro-quote serif">"고요한 마음은 온 우주보다 강하다"</p>
    <button class="intro-btn" id="intro-enter">명상 공간으로 입장</button>
  </div>
</div>

<canvas id="bg-canvas"></canvas>
<div class="orb orb-a"></div>
<div class="orb orb-b"></div>
<div class="orb orb-c"></div>

<div id="app">
  <header class="app-head"><h1 class="serif">HappyMind</h1><div class="tag">NATURAL SOUND · BREATHE · AFFIRM</div></header>
  <nav class="tabs">
    <button class="tab on" data-t="timer">타이머</button>
    <button class="tab" data-t="sound">사운드</button>
    <button class="tab" data-t="breathe">호흡 가이드</button>
  </nav>

  <section class="pnl on" id="p-timer">
    <div class="ring-wrap"><div class="ring-box">
      <svg viewBox="0 0 200 200"><defs><linearGradient id="rGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:var(--sage)"/><stop offset="100%" style="stop-color:var(--gold)"/></linearGradient></defs>
      <circle class="r-bg" cx="100" cy="100" r="90"/><circle class="r-fg" id="r-fg" cx="100" cy="100" r="90" stroke-dasharray="565.49" stroke-dashoffset="0"/></svg>
      <div class="ring-mid"><div class="ring-time" id="t-disp">05:00</div><div class="ring-lbl" id="t-lbl">준비</div></div>
    </div></div>
    <div class="presets"><button class="pre" data-m="3">3분</button><button class="pre on" data-m="5">5분</button><button class="pre" data-m="10">10분</button><button class="pre" data-m="15">15분</button><button class="pre" data-m="20">20분</button><button class="pre" data-m="30">30분</button></div>
    <div class="ctrls"><button class="cb cb-go" id="b-go">명상 시작</button><button class="cb cb-rs" id="b-rs">초기화</button></div>
    <div class="aff-card"><div class="aff-day" id="aff-day"></div><p id="aff-txt">마음을 가다듬고 있습니다...</p><button class="aff-next" id="b-aff">다음 확언</button></div>
  </section>

  <section class="pnl" id="p-sound">
    <div class="sg">
      <div class="sc on" data-s="forest"><span class="sc-ico">🌿</span><span class="sc-nm">숲·바람</span><div class="sv-w"><input type="range" min="0" max="1" step="0.01" value="0.7" class="sv"></div></div>
      <div class="sc" data-s="ocean"><span class="sc-ico">🌊</span><span class="sc-nm">파도</span><div class="sv-w"><input type="range" min="0" max="1" step="0.01" value="0.7" class="sv"></div></div>
      <div class="sc" data-s="rain"><span class="sc-ico">🌧️</span><span class="sc-nm">빗소리</span><div class="sv-w"><input type="range" min="0" max="1" step="0.01" value="0.7" class="sv"></div></div>
      <div class="sc" data-s="night"><span class="sc-ico">🌙</span><span class="sc-nm">밤·벌레</span><div class="sv-w"><input type="range" min="0" max="1" step="0.01" value="0.7" class="sv"></div></div>
      <div class="sc" data-s="fire"><span class="sc-ico">🔥</span><span class="sc-nm">모닥불</span><div class="sv-w"><input type="range" min="0" max="1" step="0.01" value="0.7" class="sv"></div></div>
      <div class="sc" data-s="bowl"><span class="sc-ico">🔔</span><span class="sc-nm">싱잉볼</span><div class="sv-w"><input type="range" min="0" max="1" step="0.01" value="0.7" class="sv"></div></div>
    </div>
    <div class="sv-hint">여러 사운드를 동시에 선택하여 나만의 분위기를 만드세요</div>
    <div class="mv"><label>MASTER</label><input type="range" id="m-vol" min="0" max="1" step="0.01" value="0.5"></div>
  </section>

  <section class="pnl" id="p-breathe">
    <div class="br-modes"><button class="br-m on" data-bm="478">4-7-8 호흡</button><button class="br-m" data-bm="box">박스 호흡</button><button class="br-m" data-bm="calm">고요 호흡</button></div>
    <div class="br-wrap"><div class="br-outer"><div class="br-ball" id="br-ball"></div><div class="br-txt" id="br-txt">시작하기</div></div><div class="br-phase" id="br-phase">탭하여 시작</div></div>
    <div class="ctrls"><button class="cb cb-go" id="b-br">호흡 시작</button></div>
  </section>

  <footer class="foot"><p>Designed & Crafted by K.G.B</p><p style="margin-top:0.2rem;letter-spacing:0.35em;font-size:0.42rem;color:rgba(255,255,255,0.08)">HAPPYMIND v7.5 · 365 AFFIRMATIONS</p></footer>
</div>

<div id="done"><div class="done-ico">🪷</div><div class="done-msg serif">고요한 명상을 마쳤습니다</div><div class="done-sub" id="done-dur"></div><button class="done-cls" id="b-done-cls">돌아가기</button></div>

<script>
// ═══ INTRO CANVAS ═══
(function(){
  var c=document.getElementById('intro-canvas'),x=c.getContext('2d'),W,H;
  function rs(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  window.addEventListener('resize',rs);rs();
  var rings=[];for(var i=0;i<6;i++)rings.push({r:25+i*40,phase:i*0.6});
  function draw(){
    if(document.getElementById('intro').classList.contains('hide'))return;
    x.clearRect(0,0,W,H);var t=Date.now()*0.001,cx=W/2,cy=H/2;
    rings.forEach(function(ring){
      var pulse=1+0.08*Math.sin(t*1.2+ring.phase);
      var r=ring.r*pulse;
      var alpha=0.035+0.025*Math.sin(t*0.8+ring.phase);
      x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);
      x.strokeStyle='rgba(212,168,83,'+alpha+')';x.lineWidth=0.5;x.stroke();
    });
    var grd=x.createRadialGradient(cx,cy,0,cx,cy,60);
    grd.addColorStop(0,'rgba(122,158,126,'+(0.04+0.02*Math.sin(t*0.6))+')');
    grd.addColorStop(1,'transparent');
    x.fillStyle=grd;x.fillRect(cx-80,cy-80,160,160);
    requestAnimationFrame(draw);
  }
  draw();
})();

document.getElementById('intro-enter').addEventListener('click',function(){
  document.getElementById('intro').classList.add('hide');
  document.getElementById('app').classList.add('show');
  document.querySelectorAll('.orb').forEach(function(o){o.classList.add('show')});
  initBg();
});

function initBg(){
  var c=document.getElementById('bg-canvas'),x=c.getContext('2d'),W,H;
  function rs(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  window.addEventListener('resize',rs);rs();
  var dots=[];
  for(var i=0;i<50;i++)dots.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,vx:(Math.random()-0.5)*0.1,vy:(Math.random()-0.5)*0.08,o:Math.random()*0.2+0.03,ph:Math.random()*6.28});
  function draw(){
    x.clearRect(0,0,W,H);var t=Date.now()*0.001;
    dots.forEach(function(d){
      d.x+=d.vx;d.y+=d.vy;
      if(d.x<0)d.x=W;if(d.x>W)d.x=0;if(d.y<0)d.y=H;if(d.y>H)d.y=0;
      var fl=d.o*(0.5+0.5*Math.sin(t*0.4+d.ph));
      x.beginPath();x.arc(d.x,d.y,d.r,0,6.28);
      x.fillStyle='rgba(212,168,83,'+fl+')';x.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ═══ TABS ═══
document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on')});
    document.querySelectorAll('.pnl').forEach(function(p){p.classList.remove('on')});
    t.classList.add('on');
    document.getElementById('p-'+t.dataset.t).classList.add('on');
  });
});

// ═══ 365 AFFIRMATIONS ═══

// AUDIO ENGINE — REBUILT
// ═══════════════════════════════════════
var ctx=null,master=null;
var live={};

function AC(){
  if(!ctx){
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain();
    master.gain.value=parseFloat(document.getElementById('m-vol').value);
    var comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-20;comp.knee.value=25;comp.ratio.value=4;
    comp.attack.value=0.005;comp.release.value=0.2;
    master.connect(comp).connect(ctx.destination);
  }
  if(ctx.state==='suspended')ctx.resume();
  return ctx;
}

function noiseBuf(sec,type){
  var c=AC(),len=c.sampleRate*sec,buf=c.createBuffer(2,len,c.sampleRate);
  for(var ch=0;ch<2;ch++){
    var d=buf.getChannelData(ch),l=0;
    for(var i=0;i<len;i++){
      var w=Math.random()*2-1;
      if(type==='brown'){d[i]=(l+0.02*w)/1.02;l=d[i];d[i]*=3.5}
      else if(type==='pink'){l=(l*0.997)+(w*0.003);d[i]=l*25}
      else d[i]=w;
    }
  }
  return buf;
}

// ── FOREST ──
function mkForest(gn){
  var c=AC(),N=[],T=[];
  var wb=c.createBufferSource();wb.buffer=noiseBuf(8,'brown');wb.loop=true;
  var wf=c.createBiquadFilter();wf.type='lowpass';wf.frequency.value=180;
  var wg=c.createGain();wg.gain.value=0.6;
  var l1=c.createOscillator();l1.frequency.value=0.03;var l1g=c.createGain();l1g.gain.value=70;
  l1.connect(l1g).connect(wf.frequency);l1.start();
  wb.connect(wf).connect(wg).connect(gn);wb.start();N.push(wb,l1);
  var rb=c.createBufferSource();rb.buffer=noiseBuf(6,'pink');rb.loop=true;
  var rf=c.createBiquadFilter();rf.type='bandpass';rf.frequency.value=700;rf.Q.value=0.6;
  var rg=c.createGain();rg.gain.value=0.12;
  rb.connect(rf).connect(rg).connect(gn);rb.start();N.push(rb);
  function bird(){
    if(!live.forest)return;var t=c.currentTime;
    var f=2000+Math.random()*1400;var dur=0.15+Math.random()*0.25;
    var notes=1+Math.floor(Math.random()*3);
    for(var n=0;n<notes;n++){
      var off=n*0.18;
      var o=c.createOscillator();var g=c.createGain();var p=c.createStereoPanner();p.pan.value=Math.random()*2-1;
      o.frequency.setValueAtTime(f*(1+n*0.1),t+off);
      o.frequency.exponentialRampToValueAtTime(f*(1.2+n*0.15),t+off+dur*0.4);
      o.frequency.exponentialRampToValueAtTime(f*(0.9+n*0.05),t+off+dur);
      g.gain.setValueAtTime(0,t+off);g.gain.linearRampToValueAtTime(0.04,t+off+0.015);
      g.gain.setValueAtTime(0.04,t+off+dur*0.6);g.gain.linearRampToValueAtTime(0,t+off+dur);
      o.connect(p).connect(g).connect(gn);o.start(t+off);o.stop(t+off+dur+0.01);
    }
    T.push(setTimeout(bird,2000+Math.random()*6000));
  }
  T.push(setTimeout(bird,1000+Math.random()*2000));
  return{nodes:N,ids:T};
}

// ── OCEAN ──
function mkOcean(gn){
  var c=AC(),N=[],T=[];
  var ob=c.createBufferSource();ob.buffer=noiseBuf(10,'brown');ob.loop=true;
  var of1=c.createBiquadFilter();of1.type='lowpass';of1.frequency.value=220;
  var og=c.createGain();og.gain.value=0.3;
  ob.connect(of1).connect(og).connect(gn);ob.start();N.push(ob);
  var fb=c.createBufferSource();fb.buffer=noiseBuf(6,'white');fb.loop=true;
  var fh=c.createBiquadFilter();fh.type='highpass';fh.frequency.value=2800;
  var fg=c.createGain();fg.gain.value=0;
  fb.connect(fh).connect(fg).connect(gn);fb.start();N.push(fb);
  var o2=c.createBufferSource();o2.buffer=noiseBuf(8,'brown');o2.loop=true;
  var o2f=c.createBiquadFilter();o2f.type='lowpass';o2f.frequency.value=300;
  var o2g=c.createGain();o2g.gain.value=0.15;
  var o2p=c.createStereoPanner();o2p.pan.value=-0.4;
  o2.connect(o2f).connect(o2g).connect(o2p).connect(gn);o2.start();N.push(o2);
  function wave(){
    if(!live.ocean)return;
    var t=c.currentTime,p=7+Math.random()*5,pk=p*0.35;
    og.gain.cancelScheduledValues(t);og.gain.setValueAtTime(og.gain.value,t);
    og.gain.linearRampToValueAtTime(0.7,t+pk);og.gain.linearRampToValueAtTime(0.12,t+p);
    fg.gain.cancelScheduledValues(t);fg.gain.setValueAtTime(0,t);
    fg.gain.linearRampToValueAtTime(0,t+pk*0.7);
    fg.gain.linearRampToValueAtTime(0.07,t+pk);fg.gain.linearRampToValueAtTime(0,t+pk+2.5);
    o2g.gain.cancelScheduledValues(t);o2g.gain.setValueAtTime(o2g.gain.value,t);
    o2g.gain.linearRampToValueAtTime(0.4,t+pk+1);o2g.gain.linearRampToValueAtTime(0.06,t+p+1);
    T.push(setTimeout(wave,p*1000));
  }
  wave();
  return{nodes:N,ids:T};
}

// ── RAIN ──
function mkRain(gn){
  var c=AC(),N=[],T=[];
  var rb=c.createBufferSource();rb.buffer=noiseBuf(8,'pink');rb.loop=true;
  var rlp=c.createBiquadFilter();rlp.type='lowpass';rlp.frequency.value=2800;
  var rg=c.createGain();rg.gain.value=0.3;
  rb.connect(rlp).connect(rg).connect(gn);rb.start();N.push(rb);
  var db=c.createBufferSource();db.buffer=noiseBuf(5,'white');db.loop=true;
  var dbp=c.createBiquadFilter();dbp.type='bandpass';dbp.frequency.value=5500;dbp.Q.value=0.7;
  var dg=c.createGain();dg.gain.value=0.05;
  db.connect(dbp).connect(dg).connect(gn);db.start();N.push(db);
  function drop(){
    if(!live.rain)return;var t=c.currentTime;
    var len=Math.floor(c.sampleRate*0.06);
    var buf=c.createBuffer(1,len,c.sampleRate);var d=buf.getChannelData(0);
    for(var i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.01));
    var s=c.createBufferSource();s.buffer=buf;
    var g=c.createGain();g.gain.value=0.02+Math.random()*0.04;
    var p=c.createStereoPanner();p.pan.value=Math.random()*2-1;
    var hp=c.createBiquadFilter();hp.type='highpass';hp.frequency.value=2500+Math.random()*3000;
    s.connect(hp).connect(p).connect(g).connect(gn);s.start();
    T.push(setTimeout(drop,40+Math.random()*180));
  }
  drop();
  function thunder(){
    if(!live.rain)return;var t=c.currentTime;
    var o=c.createOscillator();o.type='sine';o.frequency.value=30+Math.random()*25;
    var og=c.createGain();
    og.gain.setValueAtTime(0,t);og.gain.linearRampToValueAtTime(0.1,t+1);
    og.gain.linearRampToValueAtTime(0.06,t+2.5);og.gain.linearRampToValueAtTime(0,t+5);
    o.connect(og).connect(gn);o.start(t);o.stop(t+5.1);
    var nb=c.createBufferSource();nb.buffer=noiseBuf(5,'brown');
    var nlp=c.createBiquadFilter();nlp.type='lowpass';nlp.frequency.value=80;
    var ng=c.createGain();
    ng.gain.setValueAtTime(0,t);ng.gain.linearRampToValueAtTime(0.07,t+1.2);ng.gain.linearRampToValueAtTime(0,t+4.5);
    nb.connect(nlp).connect(ng).connect(gn);nb.start(t);nb.stop(t+5);
    T.push(setTimeout(thunder,20000+Math.random()*40000));
  }
  T.push(setTimeout(thunder,8000+Math.random()*12000));
  return{nodes:N,ids:T};
}

// ── NIGHT (FIXED — scheduled gain envelopes for crickets) ──
function mkNight(gn){
  var c=AC(),N=[],T=[];
  // Soft ambient
  var ab=c.createBufferSource();ab.buffer=noiseBuf(10,'brown');ab.loop=true;
  var af=c.createBiquadFilter();af.type='lowpass';af.frequency.value=100;
  var ag=c.createGain();ag.gain.value=0.2;
  ab.connect(af).connect(ag).connect(gn);ab.start();N.push(ab);

  // Cricket type A — fast chirps with scheduled gain on/off
  function cricketA(){
    if(!live.night)return;
    var t=c.currentTime;
    var freq=4000+Math.random()*2000;
    var pan=Math.random()*2-1;
    var count=3+Math.floor(Math.random()*5);
    var gap=0.04+Math.random()*0.02;
    var dur=0.02;
    for(var i=0;i<count;i++){
      var st=t+i*(dur+gap);
      var o=c.createOscillator();o.type='sine';o.frequency.value=freq+(Math.random()-0.5)*200;
      var g=c.createGain();
      g.gain.setValueAtTime(0,st);
      g.gain.linearRampToValueAtTime(0.025,st+0.003);
      g.gain.setValueAtTime(0.025,st+dur-0.003);
      g.gain.linearRampToValueAtTime(0,st+dur);
      var p=c.createStereoPanner();p.pan.value=pan;
      o.connect(p).connect(g).connect(gn);o.start(st);o.stop(st+dur+0.01);
    }
    T.push(setTimeout(cricketA,400+Math.random()*1500));
  }
  cricketA();

  // Cricket type B — slower trill
  function cricketB(){
    if(!live.night)return;
    var t=c.currentTime;
    var freq=3200+Math.random()*800;
    var pan=Math.random()*2-1;
    var count=8+Math.floor(Math.random()*10);
    for(var i=0;i<count;i++){
      var st=t+i*0.06;
      var o=c.createOscillator();o.type='sine';o.frequency.value=freq;
      var g=c.createGain();
      g.gain.setValueAtTime(0,st);
      g.gain.linearRampToValueAtTime(0.015,st+0.005);
      g.gain.setValueAtTime(0.015,st+0.025);
      g.gain.linearRampToValueAtTime(0,st+0.035);
      var p=c.createStereoPanner();p.pan.value=pan;
      o.connect(p).connect(g).connect(gn);o.start(st);o.stop(st+0.04);
    }
    T.push(setTimeout(cricketB,1500+Math.random()*3000));
  }
  T.push(setTimeout(cricketB,800));

  // Owl
  function owl(){
    if(!live.night)return;var t=c.currentTime;
    var f=380+Math.random()*60;
    [0,0.55].forEach(function(off){
      var o=c.createOscillator();o.type='sine';o.frequency.value=f;
      var g=c.createGain();
      g.gain.setValueAtTime(0,t+off);
      g.gain.linearRampToValueAtTime(0.035,t+off+0.08);
      g.gain.setValueAtTime(0.035,t+off+0.25);
      g.gain.linearRampToValueAtTime(0,t+off+0.45);
      o.connect(g).connect(gn);o.start(t+off);o.stop(t+off+0.5);
    });
    T.push(setTimeout(owl,18000+Math.random()*30000));
  }
  T.push(setTimeout(owl,5000+Math.random()*8000));
  return{nodes:N,ids:T};
}

// ── FIRE (FIXED — LFO on filter freq, burst crackles) ──
function mkFire(gn){
  var c=AC(),N=[],T=[];
  var rb=c.createBufferSource();rb.buffer=noiseBuf(8,'brown');rb.loop=true;
  var rlp=c.createBiquadFilter();rlp.type='lowpass';rlp.frequency.value=280;
  var rg=c.createGain();rg.gain.value=0.4;
  var lfo=c.createOscillator();lfo.frequency.value=0.12;
  var lfog=c.createGain();lfog.gain.value=60;
  lfo.connect(lfog).connect(rlp.frequency);lfo.start();
  rb.connect(rlp).connect(rg).connect(gn);rb.start();N.push(rb,lfo);

  var mb=c.createBufferSource();mb.buffer=noiseBuf(5,'white');mb.loop=true;
  var mbp=c.createBiquadFilter();mbp.type='bandpass';mbp.frequency.value=2200;mbp.Q.value=1.2;
  var mg=c.createGain();mg.gain.value=0.05;
  mb.connect(mbp).connect(mg).connect(gn);mb.start();N.push(mb);

  // Crackle bursts
  function crackle(){
    if(!live.fire)return;var t=c.currentTime;
    var count=3+Math.floor(Math.random()*6);
    for(var i=0;i<count;i++){
      var off=Math.random()*0.15;
      var len=Math.floor(c.sampleRate*0.03);
      var buf=c.createBuffer(1,len,c.sampleRate);var d=buf.getChannelData(0);
      for(var j=0;j<len;j++)d[j]=(Math.random()*2-1)*Math.exp(-j/(c.sampleRate*0.004));
      var s=c.createBufferSource();s.buffer=buf;
      var g=c.createGain();g.gain.value=0.03+Math.random()*0.06;
      var hp=c.createBiquadFilter();hp.type='highpass';hp.frequency.value=1800+Math.random()*3000;
      var p=c.createStereoPanner();p.pan.value=(Math.random()-0.5)*1.2;
      s.connect(hp).connect(p).connect(g).connect(gn);s.start(t+off);
    }
    T.push(setTimeout(crackle,100+Math.random()*300));
  }
  crackle();

  // Pops
  function pop(){
    if(!live.fire)return;var t=c.currentTime;
    var len=Math.floor(c.sampleRate*0.05);
    var buf=c.createBuffer(1,len,c.sampleRate);var d=buf.getChannelData(0);
    for(var i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.008));
    var s=c.createBufferSource();s.buffer=buf;
    var g=c.createGain();g.gain.value=0.1+Math.random()*0.08;
    var bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=800+Math.random()*600;bp.Q.value=2;
    s.connect(bp).connect(g).connect(gn);s.start();
    T.push(setTimeout(pop,1500+Math.random()*4000));
  }
  T.push(setTimeout(pop,800));
  return{nodes:N,ids:T};
}

// ── SINGING BOWL (FIXED — detuned pairs for natural beating) ──
function mkBowl(gn){
  var c=AC(),N=[],T=[];
  function strike(){
    if(!live.bowl)return;
    var t=c.currentTime;
    var fund=220;
    var harmonics=[
      {ratio:1,amp:0.10,detune:0.3,decay:10},
      {ratio:2.0,amp:0.06,detune:0.5,decay:8},
      {ratio:3.01,amp:0.035,detune:0.7,decay:6},
      {ratio:4.7,amp:0.02,detune:1.0,decay:5},
      {ratio:5.8,amp:0.012,detune:1.2,decay:4}
    ];
    harmonics.forEach(function(h){
      var oA=c.createOscillator();oA.type='sine';oA.frequency.value=fund*h.ratio;
      var oB=c.createOscillator();oB.type='sine';oB.frequency.value=fund*h.ratio+h.detune;
      var g=c.createGain();
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(h.amp,t+0.008);
      g.gain.setTargetAtTime(h.amp*0.5,t+0.5,h.decay*0.3);
      g.gain.setTargetAtTime(0.0001,t+h.decay*0.5,h.decay*0.3);
      oA.connect(g);oB.connect(g);g.connect(gn);
      oA.start(t);oA.stop(t+h.decay+1);
      oB.start(t);oB.stop(t+h.decay+1);
    });
    // Strike impact
    var imp=c.createBufferSource();
    var ibuf=c.createBuffer(1,c.sampleRate*0.05,c.sampleRate);
    var id=ibuf.getChannelData(0);
    for(var i=0;i<id.length;i++)id[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.005));
    imp.buffer=ibuf;
    var ig=c.createGain();ig.gain.setValueAtTime(0.06,t);ig.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    var ibp=c.createBiquadFilter();ibp.type='bandpass';ibp.frequency.value=3000;ibp.Q.value=1;
    imp.connect(ibp).connect(ig).connect(gn);imp.start(t);
    T.push(setTimeout(strike,12000+Math.random()*8000));
  }
  strike();
  return{nodes:N,ids:T};
}

var engines={forest:mkForest,ocean:mkOcean,rain:mkRain,night:mkNight,fire:mkFire,bowl:mkBowl};

function toggleSnd(type){
  if(live[type]){
    live[type].nodes.forEach(function(n){try{n.stop()}catch(e){}});
    live[type].ids.forEach(clearTimeout);
    live[type].gain.disconnect();
    delete live[type];
  }else{
    var c=AC();var gn=c.createGain();
    var card=document.querySelector('.sc[data-s="'+type+'"]');
    var sv=card?card.querySelector('.sv'):null;
    gn.gain.value=sv?parseFloat(sv.value):0.7;
    gn.connect(master);
    var r=engines[type](gn);
    live[type]={gain:gn,nodes:r.nodes,ids:r.ids};
  }
}

document.querySelectorAll('.sc').forEach(function(card){
  card.addEventListener('click',function(e){
    if(e.target.classList.contains('sv'))return;
    card.classList.toggle('on');
    toggleSnd(card.dataset.s);
  });
  var sv=card.querySelector('.sv');
  if(sv){
    sv.addEventListener('input',function(e){
      e.stopPropagation();
      var type=card.dataset.s;
      if(live[type])live[type].gain.gain.setTargetAtTime(parseFloat(e.target.value),ctx.currentTime,0.1);
    });
    sv.addEventListener('click',function(e){e.stopPropagation()});
  }
});
document.getElementById('m-vol').addEventListener('input',function(e){
  if(master)master.gain.setTargetAtTime(parseFloat(e.target.value),ctx.currentTime,0.1);
});

var needsInit=true;
function ensureSnd(){if(needsInit&&Object.keys(live).length===0){toggleSnd('forest');needsInit=false}}

// ═══ TIMER ═══
var total=300,left=300,tid=null,running=false;
var CIRC=2*Math.PI*90;
var rFg=document.getElementById('r-fg');
rFg.style.strokeDasharray=CIRC;rFg.style.strokeDashoffset='0';
function updT(){
  var m=Math.floor(left/60),s=left%60;
  document.getElementById('t-disp').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  rFg.style.strokeDashoffset=CIRC*(1-left/total);
}
function startT(){
  if(running){clearInterval(tid);running=false;document.getElementById('b-go').textContent='이어서';document.getElementById('t-lbl').textContent='일시정지';return}
  ensureSnd();running=true;
  document.getElementById('b-go').textContent='일시정지';document.getElementById('t-lbl').textContent='명상 중';
  tid=setInterval(function(){left--;updT();if(left<=0){clearInterval(tid);running=false;document.getElementById('b-go').textContent='명상 시작';document.getElementById('t-lbl').textContent='완료';onDone()}},1000);
}
function resetT(){
  clearInterval(tid);running=false;
  var ap=document.querySelector('.pre.on');
  total=ap?parseInt(ap.dataset.m)*60:300;left=total;updT();
  rFg.style.strokeDashoffset='0';
  document.getElementById('b-go').textContent='명상 시작';document.getElementById('t-lbl').textContent='준비';
}
function onDone(){
  var c=AC(),t=c.currentTime;
  [1,1.5,2,3].forEach(function(h,i){
    var o=c.createOscillator();o.frequency.value=440*h;
    var g=c.createGain();
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime([0.08,0.05,0.03,0.015][i],t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+6);
    o.connect(g).connect(master);o.start();o.stop(t+7);
  });
  document.getElementById('done-dur').textContent=Math.round(total/60)+'분간의 고요한 시간이었습니다';
  document.getElementById('done').classList.add('show');
}
document.getElementById('b-go').addEventListener('click',startT);
document.getElementById('b-rs').addEventListener('click',resetT);
document.getElementById('b-done-cls').addEventListener('click',function(){document.getElementById('done').classList.remove('show');resetT()});
document.querySelectorAll('.pre').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.pre').forEach(function(x){x.classList.remove('on')});b.classList.add('on');
    if(!running){total=parseInt(b.dataset.m)*60;left=total;updT();rFg.style.strokeDashoffset='0'}
  });
});

// ═══ BREATHING ═══
var bModes={'478':{i:4,h:7,o:8,h2:0},'box':{i:4,h:4,o:4,h2:4},'calm':{i:5,h:0,o:7,h2:0}};
var bMode='478',bRun=false,bTid=null;
document.querySelectorAll('.br-m').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.br-m').forEach(function(x){x.classList.remove('on')});b.classList.add('on');
    bMode=b.dataset.bm;if(bRun){stopB();startB()}
  });
});
function startB(){bRun=true;document.getElementById('b-br').textContent='호흡 멈춤';ensureSnd();bCycle()}
function stopB(){bRun=false;clearTimeout(bTid);document.getElementById('b-br').textContent='호흡 시작';document.getElementById('br-ball').className='br-ball';document.getElementById('br-txt').textContent='시작하기';document.getElementById('br-phase').textContent='탭하여 시작'}
function bCycle(){
  if(!bRun)return;
  var m=bModes[bMode];var ball=document.getElementById('br-ball');var txt=document.getElementById('br-txt');var ph=document.getElementById('br-phase');
  ball.style.transition='all '+m.i+'s ease-in-out';ball.className='br-ball';
  setTimeout(function(){ball.classList.add('in')},30);
  txt.textContent='들숨';ph.textContent=m.i+'초 들이마시기';
  bTid=setTimeout(function(){
    if(!bRun)return;
    if(m.h>0){
      ball.style.transition='all 0.5s ease';ball.className='br-ball in hold';
      txt.textContent='참기';ph.textContent=m.h+'초 멈추기';
      bTid=setTimeout(function(){if(bRun)exPhase()},m.h*1000);
    }else exPhase();
  },m.i*1000);
  function exPhase(){
    ball.style.transition='all '+m.o+'s ease-in-out';ball.className='br-ball out';
    txt.textContent='날숨';ph.textContent=m.o+'초 내쉬기';
    bTid=setTimeout(function(){
      if(!bRun)return;
      if(m.h2>0){ball.style.transition='all 0.5s ease';txt.textContent='참기';ph.textContent=m.h2+'초 멈추기';
        bTid=setTimeout(function(){if(bRun)bCycle()},m.h2*1000);
      }else bCycle();
    },m.o*1000);
  }
}
document.getElementById('b-br').addEventListener('click',function(){if(bRun)stopB();else startB()});
updT();
</script>
</body>
</html>
